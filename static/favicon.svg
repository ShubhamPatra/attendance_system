<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AutoAttendance Admin">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#233343"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffc099"/>
      <stop offset="100%" stop-color="#ffa069"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d4356"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffa069" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffa069" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>

  <!-- Shield body -->
  <path d="M32 8 L48 16 L48 30 Q48 44 32 54 Q16 44 16 30 L16 16 Z"
        fill="url(#shield-fill)" stroke="#3a5068" stroke-width="0.8" opacity="0.9"/>

  <!-- Face silhouette (head) -->
  <circle cx="32" cy="24" r="6.5" fill="none" stroke="#c8d8e8" stroke-width="1.6"/>

  <!-- Shoulders arc -->
  <path d="M23.5 38 Q27 32 32 32 Q37 32 40.5 38"
        fill="none" stroke="#c8d8e8" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Scan reticle — top-left corner -->
  <path d="M24 18 L24 15 L27 15" fill="none" stroke="url(#accent)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Scan reticle — top-right corner -->
  <path d="M40 15 L37 15 M40 15 L40 18" fill="none" stroke="url(#accent)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Scan reticle — bottom-left corner -->
  <path d="M24 34 L24 37 L27 37" fill="none" stroke="url(#accent)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Scan reticle — bottom-right corner -->
  <path d="M40 37 L37 37 M40 37 L40 34" fill="none" stroke="url(#accent)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Scan line (animated feel) -->
  <line x1="25" y1="26" x2="39" y2="26" stroke="#ffa069" stroke-width="0.8" opacity="0.5" stroke-dasharray="2 2"/>

  <!-- Verified checkmark badge -->
  <g transform="translate(44,44)">
    <circle cx="0" cy="0" r="8" fill="#ffa069"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#e88a4a" stroke-width="0.5"/>
    <path d="M-3.5 0 L-1 3 L4 -2.5" fill="none" stroke="#1a2a3a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Subtle highlight edge -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
</svg>