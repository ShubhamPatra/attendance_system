apiVersion: v1
kind: Service
metadata:
  name: attendance-admin
  namespace: attendance-system
  labels:
    app: attendance
    component: admin
    phase: 7
  annotations:
    description: "AutoAttendance Admin Application Service - ClusterIP"
spec:
  type: ClusterIP
  selector:
    app: attendance
    component: admin
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: attendance-admin-metrics
  namespace: attendance-system
  labels:
    app: attendance
    component: admin
    monitoring: "true"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
    prometheus.io/path: "/metrics"
    description: "Metrics endpoint for Prometheus scraping"
spec:
  type: ClusterIP
  selector:
    app: attendance
    component: admin
  ports:
  - name: metrics
    port: 5000
    targetPort: 5000
    protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: attendance-admin-network-policy
  namespace: attendance-system
  labels:
    app: attendance
    component: admin
spec:
  podSelector:
    matchLabels:
      app: attendance
      component: admin
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from nginx-ingress-controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 5000
  # Allow traffic from Prometheus
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 5000
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow outbound to MongoDB Atlas
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 27017
    - protocol: TCP
      port: 27018
    - protocol: TCP
      port: 27019
    - protocol: TCP
      port: 27020
    - protocol: TCP
      port: 443  # MongoDB Atlas over TLS
  # Allow traffic to other pods in namespace
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 5000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: attendance-admin-ingress
  namespace: attendance-system
  labels:
    app: attendance
    component: admin
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting to prevent abuse
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - "attendance-admin.example.com"  # Replace with actual domain
    secretName: attendance-admin-tls
  rules:
  - host: "attendance-admin.example.com"  # Replace with actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: attendance-admin
            port:
              number: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: attendance-admin-pdb
  namespace: attendance-system
  labels:
    app: attendance
    component: admin
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: attendance
      component: admin

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: attendance-admin-hpa
  namespace: attendance-system
  labels:
    app: attendance
    component: admin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: attendance-admin
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
