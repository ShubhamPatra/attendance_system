apiVersion: v1
kind: ConfigMap
metadata:
  name: attendance-config
  namespace: attendance-system
  labels:
    app: attendance
    component: config
    phase: 7
  annotations:
    description: "AutoAttendance Configuration - Environment Variables"
data:
  # Flask Configuration
  FLASK_ENV: "production"
  FLASK_DEBUG: "0"
  APP_HOST: "0.0.0.0"
  APP_PORT: "5000"
  
  # Database Configuration (MongoDB)
  # MONGO_URI is in Secrets due to credentials
  DATABASE_NAME: "attendance_system"
  MONGO_SERVER_SELECTION_TIMEOUT_MS: "5000"
  MONGO_CONNECT_TIMEOUT_MS: "5000"
  MONGO_CONNECT_RETRIES: "3"
  MONGO_CONNECT_RETRY_DELAY_SECONDS: "1.0"
  MONGO_MAX_POOL_SIZE: "50"
  MONGO_MIN_POOL_SIZE: "5"
  MONGO_MAX_IDLE_TIME_MS: "45000"
  
  # MongoDB Circuit Breaker
  MONGO_CIRCUIT_BREAKER_THRESHOLD: "5"
  MONGO_CIRCUIT_BREAKER_TIMEOUT_SECONDS: "60.0"
  
  # Phase 1: Reliability Hardening
  CAMERA_FRAME_TIMEOUT_SECONDS: "5.0"
  CAMERA_FRAME_TIMEOUT_CHECK_INTERVAL_SECONDS: "1.0"
  FRAME_QUEUE_MAX_DEPTH: "50"
  FRAME_DROP_ENABLED: "1"
  GRACEFUL_DEGRADATION_ENABLED: "1"
  GRACEFUL_DEGRADATION_CPU_THRESHOLD: "80.0"
  GRACEFUL_DEGRADATION_MEMORY_THRESHOLD: "85.0"
  GRACEFUL_DEGRADATION_DETECTION_INTERVAL_MAX: "15"
  GRACEFUL_DEGRADATION_DISABLE_ANTISPOOF: "1"
  
  # Phase 2: Metrics & Observability
  SLOW_FRAME_THRESHOLD_MS: "100.0"
  
  # Phase 3: Recognition Confidence & False Positive Control
  RECOGNITION_TOP2_SIMILARITY_MARGIN: "0.05"
  COMPOSED_CONFIDENCE_RECOGNITION_WEIGHT: "0.5"
  COMPOSED_CONFIDENCE_LIVENESS_WEIGHT: "0.3"
  COMPOSED_CONFIDENCE_CONSISTENCY_WEIGHT: "0.2"
  
  # Recognition Thresholds
  RECOGNITION_THRESHOLD: "0.38"
  RECOGNITION_MIN_CONFIDENCE: "0.46"
  RECOGNITION_MIN_DISTANCE_GAP: "0.08"
  
  # Liveness / Anti-Spoofing
  LIVENESS_CONFIDENCE_THRESHOLD: "0.55"
  LIVENESS_STRICT_THRESHOLD: "0.85"
  LIVENESS_REAL_FAST_CONFIDENCE: "0.72"
  
  # Face Detection (YuNet)
  YUNET_SCORE_THRESHOLD: "0.62"
  YUNET_NMS_THRESHOLD: "0.23"
  
  # ML Backend
  EMBEDDING_BACKEND: "arcface"
  EMBEDDING_DIM: "512"
  ENABLE_GPU_PROVIDERS: "1"
  ONNXRT_PROVIDER_PRIORITY: "CUDAExecutionProvider,CPUExecutionProvider"
  ARCFACE_MODEL_NAME: "buffalo_l"
  ARCFACE_DET_SIZE: "320"
  
  # Vector Search
  ENABLE_VECTOR_SEARCH: "1"
  VECTOR_SEARCH_BACKEND: "faiss"
  FAISS_INDEX_TYPE: "IVFFlat"
  FAISS_INDEX_NLIST: "50"
  FAISS_INDEX_NPROBE: "10"
  VECTOR_SEARCH_K: "5"
  
  # Analytics
  ENABLE_ANALYTICS: "1"
  ANALYTICS_CACHE_SECONDS: "300.0"
  
  # Multi-Camera
  CAMERA_INDICES: "0"
  CAMERA_RECONNECT_INITIAL_DELAY_SECONDS: "1.0"
  CAMERA_RECONNECT_MAX_DELAY_SECONDS: "30.0"
  CAMERA_RECONNECT_MAX_ATTEMPTS: "12"
  
  # File Upload
  UPLOAD_MAX_SIZE: "5242880"  # 5MB in bytes
  ALLOWED_EXTENSIONS: "png,jpg,jpeg"
  
  # Logging
  LOG_LEVEL: "INFO"
  
  # Feature Flags
  ENABLE_RBAC: "0"
  ENABLE_RESTX_API: "0"
  PPE_DETECTION_ENABLED: "0"
  ENABLE_ADVANCED_LIVENESS: "1"
  ENABLE_CHALLENGE_RESPONSE: "0"
  ENABLE_TEXTURE_ANALYSIS: "1"
  
  # Deployment Environment
  DEPLOY_ENV: "kubernetes"

---
apiVersion: v1
kind: Secret
metadata:
  name: attendance-secrets
  namespace: attendance-system
  labels:
    app: attendance
    component: secrets
    phase: 7
  annotations:
    description: "AutoAttendance Secrets - Credentials and Sensitive Data"
type: Opaque
stringData:
  # MongoDB Connection String (replace with actual value)
  MONGO_URI: "mongodb+srv://username:password@cluster.mongodb.net/?retryWrites=true&w=majority"
  
  # Flask Secret Key (replace with actual secure value)
  SECRET_KEY: "your-super-secret-key-change-in-production"
  
  # JWT Token Lifetime (hours)
  JWT_ACCESS_TOKEN_LIFETIME_HOURS: "1"
  JWT_REFRESH_TOKEN_LIFETIME_HOURS: "24"
  JWT_ALGORITHM: "HS256"
  
  # API Keys or other sensitive configuration
  # Add any additional secrets here

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: attendance-health-check-script
  namespace: attendance-system
  labels:
    app: attendance
    component: health-check
data:
  health-check.sh: |
    #!/bin/bash
    # Comprehensive health check script
    # Used for debugging health probe failures
    
    ENDPOINT="http://localhost:5000"
    
    echo "=== Attendance System Health Check ==="
    echo "Time: $(date)"
    echo ""
    
    # Basic liveness check
    echo "[1/3] Liveness Check (GET /api/health):"
    curl -s -w "\nHTTP Status: %{http_code}\n" "$ENDPOINT/api/health" || echo "FAILED"
    echo ""
    
    # Readiness check
    echo "[2/3] Readiness Check (GET /api/readiness):"
    curl -s -w "\nHTTP Status: %{http_code}\n" "$ENDPOINT/api/readiness" || echo "FAILED"
    echo ""
    
    # Detailed diagnostics
    echo "[3/3] Detailed Health Check (GET /api/health/detailed):"
    curl -s -w "\nHTTP Status: %{http_code}\n" "$ENDPOINT/api/health/detailed" || echo "FAILED"
    echo ""
    
    echo "=== End Health Check ==="
