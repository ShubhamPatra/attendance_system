apiVersion: v1
kind: ConfigMap
metadata:
  name: autoattendance-config
data:
  APP_HOST: "0.0.0.0"
  APP_PORT: "5000"
  APP_DEBUG: "0"
  ENABLE_RBAC: "1"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoattendance-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoattendance-web
  template:
    metadata:
      labels:
        app: autoattendance-web
    spec:
      containers:
        - name: web
          image: autoattendance:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: autoattendance-config
            - secretRef:
                name: autoattendance-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: autoattendance-web
spec:
  selector:
    app: autoattendance-web
  ports:
    - port: 80
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
