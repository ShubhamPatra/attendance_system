<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AutoAttendance Student">
  <defs>
    <linearGradient id="bg-s" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16324f"/>
      <stop offset="100%" stop-color="#1e3d5c"/>
    </linearGradient>
    <linearGradient id="cap-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffc099"/>
      <stop offset="100%" stop-color="#e88a4a"/>
    </linearGradient>
    <radialGradient id="glow-s" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ffa069" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffa069" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg-s)"/>
  <rect width="64" height="64" rx="14" fill="url(#glow-s)"/>

  <!-- Face silhouette (head) -->
  <circle cx="32" cy="30" r="8" fill="none" stroke="#dce6f0" stroke-width="1.8"/>

  <!-- Shoulders / body arc -->
  <path d="M19 50 Q24 40 32 40 Q40 40 45 50"
        fill="none" stroke="#dce6f0" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Graduation cap — board (diamond shape) -->
  <polygon points="32,10 50,18 32,22 14,18" fill="url(#cap-fill)" opacity="0.95"/>

  <!-- Graduation cap — mortarboard top -->
  <rect x="29" y="14" width="6" height="2" rx="1" fill="#d47b41" opacity="0.8"/>

  <!-- Tassel -->
  <line x1="48" y1="18" x2="50" y2="26" stroke="#ffc099" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="50" cy="27" r="1.5" fill="#ffc099"/>

  <!-- ID badge accent (bottom-right) -->
  <g transform="translate(46,46)">
    <rect x="-6" y="-7" width="12" height="14" rx="2.5" fill="#ffa069"/>
    <rect x="-6" y="-7" width="12" height="14" rx="2.5" fill="none" stroke="#e88a4a" stroke-width="0.5"/>
    <!-- Mini face icon on badge -->
    <circle cx="0" cy="-2" r="2" fill="#1a2a3a" opacity="0.6"/>
    <!-- Badge lines -->
    <line x1="-3" y1="3" x2="3" y2="3" stroke="#1a2a3a" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <line x1="-2" y1="5" x2="2" y2="5" stroke="#1a2a3a" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Subtle highlight edge -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
</svg>
