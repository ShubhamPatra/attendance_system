{% extends "base.html" %}
{% block title %}Student Registration{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card auth-card--wide">
        <div class="auth-header">
            <h1>Create Student Account</h1>
            <p>After signup, complete face capture to enable attendance access.</p>
        </div>

        <form method="post" class="flex flex-col gap-4">
            <div class="form-group">
                <label for="name" class="form-label">Full Name</label>
                <input id="name" name="name" type="text" required class="form-input" placeholder="Enter your full name">
            </div>
            <div class="form-row form-row--2">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" name="email" type="email" required class="form-input" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="registration_number" class="form-label">Registration Number</label>
                    <input id="registration_number" name="registration_number" type="text" required class="form-input" placeholder="e.g. FA21-BCS-001">
                </div>
            </div>
            <div class="form-row form-row--2">
                <div class="form-group">
                    <label for="semester" class="form-label">Semester (1-8)</label>
                    <input id="semester" name="semester" type="number" min="1" max="8" required class="form-input">
                </div>
                <div class="form-group">
                    <label for="section" class="form-label">Section</label>
                    <input id="section" name="section" type="text" required class="form-input" placeholder="e.g. A">
                </div>
            </div>
            <div class="form-row form-row--2">
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" minlength="8" required class="form-input" placeholder="Min 8 characters">
                </div>
                <div class="form-group">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input id="confirm_password" name="confirm_password" type="password" minlength="8" required class="form-input" placeholder="Re-enter password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
        </form>

        <p class="auth-footer">
            Already registered?
            <a href="{{ url_for('student.login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
