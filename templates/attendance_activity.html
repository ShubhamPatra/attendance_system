{% extends "base.html" %}
{% block title %}Attendance Activity{% endblock %}

{% block content %}
<div class="flex flex-col gap-6">
    <div class="flex flex-col gap-1">
        <h1 class="text-2xl font-semibold tracking-tight text-text-primary">Attendance Activity</h1>
        <p class="text-text-muted text-sm">Visualize attendance distribution by hour for a selected date.</p>
    </div>

    <!-- Date Picker -->
    <div class="bg-white rounded-lg shadow-sm border border-border-light p-6">
        <div class="flex flex-col sm:flex-row gap-4 items-end">
            <label class="flex flex-col gap-1.5 flex-1 max-w-xs">
                <span class="text-text-primary text-sm font-medium">Date</span>
                <input type="date" id="activityDate" class="w-full rounded-md border-border-light bg-background-light h-11 px-3 text-sm focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all text-text-primary">
            </label>
            <button type="button" id="loadBtn" class="flex items-center justify-center gap-2 px-5 h-11 rounded-md bg-primary hover:bg-primary-dark text-white transition-colors text-sm font-semibold">
                <span class="material-symbols-outlined text-[20px]">bar_chart</span>
                <span>Load</span>
            </button>
        </div>
    </div>

    <!-- Chart Area -->
    <div class="bg-white rounded-lg shadow-sm border border-border-light p-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-semibold text-text-primary">Attendance per Hour</h3>
            <span class="text-xs text-text-muted" id="chartDateLabel">—</span>
        </div>
        <div class="relative" style="height: 320px;">
            <canvas id="activityChart"></canvas>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
var ctx = document.getElementById('activityChart').getContext('2d');
var chart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: [],
        datasets: [{
            label: 'Students Present',
            data: [],
            backgroundColor: 'rgba(74, 111, 165, 0.7)',
            borderColor: '#4A6FA5',
            borderWidth: 1,
            borderRadius: 4,
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false },
        },
        scales: {
            y: {
                beginAtZero: true,
                ticks: { stepSize: 1, color: '#6B7280', font: { size: 11 } },
                grid: { color: '#E5E7EB' },
                title: { display: true, text: 'Count', color: '#6B7280', font: { size: 12 } },
            },
            x: {
                ticks: { color: '#6B7280', font: { size: 11 } },
                grid: { display: false },
                title: { display: true, text: 'Hour of Day', color: '#6B7280', font: { size: 12 } },
            }
        }
    }
});

// Default to today
var dateInput = document.getElementById('activityDate');
var today = new Date();
dateInput.value = today.getFullYear() + '-'
    + String(today.getMonth() + 1).padStart(2, '0') + '-'
    + String(today.getDate()).padStart(2, '0');

function loadActivity() {
    var date = dateInput.value;
    if (!date) return;
    document.getElementById('chartDateLabel').textContent = date;

    fetch('{{ url_for("main.api_attendance_activity") }}?date=' + encodeURIComponent(date))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            // Build full 24-hour labels
            var labels = [];
            var counts = new Array(24).fill(0);
            for (var h = 0; h < 24; h++) {
                labels.push(String(h).padStart(2, '0') + ':00');
            }
            // Fill in actual data
            (data.hours || []).forEach(function(item) {
                counts[item.hour] = item.count;
            });
            chart.data.labels = labels;
            chart.data.datasets[0].data = counts;
            chart.update();
        })
        .catch(function() {});
}

document.getElementById('loadBtn').addEventListener('click', loadActivity);
loadActivity();
</script>
{% endblock %}
