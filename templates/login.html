{% extends "base.html" %}
{% block title %}Login | AutoAttendance{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Staff Login</h1>
            <p>Sign in as Admin or Teacher.</p>
        </div>
        <form method="post" autocomplete="off" class="space-y-4">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input id="username" name="username" type="text" required class="form-input" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" required class="form-input" placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Login</button>
        </form>
    </div>
</div>
{% endblock %}
