services:
  web:
    build: .
    container_name: autoattendance-web
    env_file:
      - .env
    command: gunicorn --bind 0.0.0.0:5000 --config gunicorn.conf.py "app:create_app()"
    ports:
      - "5000:5000"
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./unknown_faces:/app/unknown_faces

  student-web:
    build: .
    container_name: autoattendance-student-web
    env_file:
      - .env
    command: gunicorn --bind 0.0.0.0:5001 --config gunicorn.conf.py "student_app.app:create_app()"
    ports:
      - "5001:5001"
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  celery-worker:
    build: .
    container_name: autoattendance-celery-worker
    command: celery -A tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs

  celery-beat:
    build: .
    container_name: autoattendance-celery-beat
    command: celery -A tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs

  redis:
    image: redis:7-alpine
    container_name: autoattendance-redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    container_name: autoattendance-nginx
    depends_on:
      - web
      - student-web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
