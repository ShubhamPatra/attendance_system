<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="700" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    AutoAttendance: Deployment Tiers & Hardware Requirements
  </text>
  
  <!-- Tier 1: Small Scale -->
  <g>
    <rect x="50" y="80" width="380" height="880" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
    <text x="240" y="110" font-size="16" font-weight="bold" text-anchor="middle" fill="#1976D2">Tier 1: Small Scale</text>
    <text x="240" y="132" font-size="12" text-anchor="middle" fill="#666">100-500 students | 1-3 rooms</text>
    
    <!-- Use cases -->
    <rect x="65" y="150" width="350" height="100" fill="#BBDEFB" stroke="#1976D2" stroke-width="1" rx="3"/>
    <text x="240" y="175" font-size="11" font-weight="bold" text-anchor="middle" fill="#1976D2">Use Cases</text>
    <text x="75" y="200" font-size="10" fill="#333">• Small tuition centers</text>
    <text x="75" y="218" font-size="10" fill="#333">• Coaching classes</text>
    <text x="75" y="236" font-size="10" fill="#333">• Single classroom deployment</text>
    
    <!-- Hardware -->
    <rect x="65" y="265" width="350" height="130" fill="#BBDEFB" stroke="#1976D2" stroke-width="1" rx="3"/>
    <text x="240" y="290" font-size="11" font-weight="bold" text-anchor="middle" fill="#1976D2">Hardware</text>
    <text x="75" y="315" font-size="10" fill="#333">CPU: Intel i5-10400 (6-core)</text>
    <text x="75" y="333" font-size="10" fill="#333">RAM: 8 GB DDR4</text>
    <text x="75" y="351" font-size="10" fill="#333">Storage: 256 GB SSD</text>
    <text x="75" y="369" font-size="10" fill="#333">GPU: None (CPU inference)</text>
    <text x="75" y="387" font-size="10" fill="#333">Deployment: Single server (on-premises)</text>
    
    <!-- Software Stack -->
    <rect x="65" y="410" width="350" height="100" fill="#BBDEFB" stroke="#1976D2" stroke-width="1" rx="3"/>
    <text x="240" y="435" font-size="11" font-weight="bold" text-anchor="middle" fill="#1976D2">Software Stack</text>
    <text x="75" y="460" font-size="10" fill="#333">OS: Ubuntu 22.04 LTS</text>
    <text x="75" y="478" font-size="10" fill="#333">Flask + SocketIO</text>
    <text x="75" y="496" font-size="10" fill="#333">MongoDB (single instance)</text>
    <text x="75" y="514" font-size="10" fill="#333">Nginx reverse proxy</text>
    
    <!-- Performance -->
    <rect x="65" y="525" width="350" height="100" fill="#BBDEFB" stroke="#1976D2" stroke-width="1" rx="3"/>
    <text x="240" y="550" font-size="11" font-weight="bold" text-anchor="middle" fill="#1976D2">Performance</text>
    <text x="75" y="575" font-size="10" fill="#333">Throughput: 10 students/minute</text>
    <text x="75" y="593" font-size="10" fill="#333">Latency: 100ms per face</text>
    <text x="75" y="611" font-size="10" fill="#333">Concurrent users: 20</text>
    <text x="75" y="629" font-size="10" fill="#333">Accuracy: 99.2%</text>
    
    <!-- Cost Analysis -->
    <rect x="65" y="640" width="350" height="110" fill="#BBDEFB" stroke="#1976D2" stroke-width="1" rx="3"/>
    <text x="240" y="665" font-size="11" font-weight="bold" text-anchor="middle" fill="#1976D2">Cost Analysis</text>
    <text x="75" y="690" font-size="10" fill="#333">Hardware: $800-1200</text>
    <text x="75" y="708" font-size="10" fill="#333">Setup: $500 (one-time)</text>
    <text x="75" y="726" font-size="10" fill="#333">Maintenance/year: $300</text>
    <text x="75" y="744" font-size="10" font-weight="bold" fill="#1976D2">Per student/year: $2-4</text>
    
    <!-- Checklist -->
    <rect x="65" y="765" width="350" height="185" fill="#C5E1A5" stroke="#558B2F" stroke-width="1" rx="3"/>
    <text x="240" y="790" font-size="11" font-weight="bold" text-anchor="middle" fill="#558B2F">Deployment Checklist</text>
    <text x="75" y="815" font-size="10" fill="#333">✓ Single server in campus</text>
    <text x="75" y="833" font-size="10" fill="#333">✓ Gigabit network connectivity</text>
    <text x="75" y="851" font-size="10" fill="#333">✓ UPS battery backup</text>
    <text x="75" y="869" font-size="10" fill="#333">✓ Anti-spoofing enabled</text>
    <text x="75" y="887" font-size="10" fill="#333">✓ Local backup strategy</text>
    <text x="75" y="905" font-size="10" fill="#333">✓ Attendance export (CSV)</text>
    <text x="75" y="923" font-size="10" fill="#333">✓ Multi-device access (Web UI)</text>
  </g>
  
  <!-- Tier 2: Medium Scale -->
  <g>
    <rect x="510" y="80" width="380" height="880" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="5"/>
    <text x="700" y="110" font-size="16" font-weight="bold" text-anchor="middle" fill="#9C27B0">Tier 2: Medium Scale</text>
    <text x="700" y="132" font-size="12" text-anchor="middle" fill="#666">500-2000 students | 5-10 rooms</text>
    
    <!-- Use cases -->
    <rect x="525" y="150" width="350" height="100" fill="#E1BEE7" stroke="#9C27B0" stroke-width="1" rx="3"/>
    <text x="700" y="175" font-size="11" font-weight="bold" text-anchor="middle" fill="#9C27B0">Use Cases</text>
    <text x="535" y="200" font-size="10" fill="#333">• Small colleges</text>
    <text x="535" y="218" font-size="10" fill="#333">• Multi-floor deployment</text>
    <text x="535" y="236" font-size="10" fill="#333">• Multiple departments</text>
    
    <!-- Hardware -->
    <rect x="525" y="265" width="350" height="130" fill="#E1BEE7" stroke="#9C27B0" stroke-width="1" rx="3"/>
    <text x="700" y="290" font-size="11" font-weight="bold" text-anchor="middle" fill="#9C27B0">Hardware</text>
    <text x="535" y="315" font-size="10" fill="#333">CPU: Intel Xeon E5-2680 v3 (12-core)</text>
    <text x="535" y="333" font-size="10" fill="#333">RAM: 32 GB DDR4</text>
    <text x="535" y="351" font-size="10" fill="#333">Storage: 2 TB SSD RAID-1 (mirrored)</text>
    <text x="535" y="369" font-size="10" fill="#333">GPU: NVIDIA GeForce RTX 2060 (optional)</text>
    <text x="535" y="387" font-size="10" fill="#333">Deployment: Dual server cluster (active-passive)</text>
    
    <!-- Software Stack -->
    <rect x="525" y="410" width="350" height="100" fill="#E1BEE7" stroke="#9C27B0" stroke-width="1" rx="3"/>
    <text x="700" y="435" font-size="11" font-weight="bold" text-anchor="middle" fill="#9C27B0">Software Stack</text>
    <text x="535" y="460" font-size="10" fill="#333">OS: Ubuntu 22.04 LTS (clustered)</text>
    <text x="535" y="478" font-size="10" fill="#333">Flask + SocketIO + Gunicorn (4 workers)</text>
    <text x="535" y="496" font-size="10" fill="#333">MongoDB replica set (2 replicas)</text>
    <text x="535" y="514" font-size="10" fill="#333">Redis for session caching</text>
    
    <!-- Performance -->
    <rect x="525" y="525" width="350" height="100" fill="#E1BEE7" stroke="#9C27B0" stroke-width="1" rx="3"/>
    <text x="700" y="550" font-size="11" font-weight="bold" text-anchor="middle" fill="#9C27B0">Performance</text>
    <text x="535" y="575" font-size="10" fill="#333">Throughput: 30 students/minute</text>
    <text x="535" y="593" font-size="10" fill="#333">Latency: 80ms per face (GPU acceleration)</text>
    <text x="535" y="611" font-size="10" fill="#333">Concurrent users: 100</text>
    <text x="535" y="629" font-size="10" fill="#333">Accuracy: 99.2%</text>
    
    <!-- Cost Analysis -->
    <rect x="525" y="640" width="350" height="110" fill="#E1BEE7" stroke="#9C27B0" stroke-width="1" rx="3"/>
    <text x="700" y="665" font-size="11" font-weight="bold" text-anchor="middle" fill="#9C27B0">Cost Analysis</text>
    <text x="535" y="690" font-size="10" fill="#333">Hardware: $4000-6000</text>
    <text x="535" y="708" font-size="10" fill="#333">Setup: $2000 (clustering, replication)</text>
    <text x="535" y="726" font-size="10" fill="#333">Maintenance/year: $1200</text>
    <text x="535" y="744" font-size="10" font-weight="bold" fill="#9C27B0">Per student/year: $3-5</text>
    
    <!-- Checklist -->
    <rect x="525" y="765" width="350" height="185" fill="#C5E1A5" stroke="#558B2F" stroke-width="1" rx="3"/>
    <text x="700" y="790" font-size="11" font-weight="bold" text-anchor="middle" fill="#558B2F">Deployment Checklist</text>
    <text x="535" y="815" font-size="10" fill="#333">✓ Dual server failover setup</text>
    <text x="535" y="833" font-size="10" fill="#333">✓ MongoDB replica set</text>
    <text x="535" y="851" font-size="10" fill="#333">✓ Redis session cache</text>
    <text x="535" y="869" font-size="10" fill="#333">✓ GPU acceleration enabled</text>
    <text x="535" y="887" font-size="10" fill="#333">✓ Automated backups (daily)</text>
    <text x="535" y="905" font-size="10" fill="#333">✓ Admin dashboard with reports</text>
    <text x="535" y="923" font-size="10" fill="#333">✓ SSL/TLS encryption</text>
  </g>
  
  <!-- Tier 3: Enterprise Scale -->
  <g>
    <rect x="970" y="80" width="380" height="880" fill="#FFF4E6" stroke="#FF9800" stroke-width="2" rx="5"/>
    <text x="1160" y="110" font-size="16" font-weight="bold" text-anchor="middle" fill="#FF9800">Tier 3: Enterprise Scale</text>
    <text x="1160" y="132" font-size="12" text-anchor="middle" fill="#666">2000+ students | 20+ rooms</text>
    
    <!-- Use cases -->
    <rect x="985" y="150" width="350" height="100" fill="#FFE0B2" stroke="#FF9800" stroke-width="1" rx="3"/>
    <text x="1160" y="175" font-size="11" font-weight="bold" text-anchor="middle" fill="#FF9800">Use Cases</text>
    <text x="995" y="200" font-size="10" fill="#333">• Large universities</text>
    <text x="995" y="218" font-size="10" fill="#333">• Multi-campus deployment</text>
    <text x="995" y="236" font-size="10" fill="#333">• National rollout</text>
    
    <!-- Hardware -->
    <rect x="985" y="265" width="350" height="130" fill="#FFE0B2" stroke="#FF9800" stroke-width="1" rx="3"/>
    <text x="1160" y="290" font-size="11" font-weight="bold" text-anchor="middle" fill="#FF9800">Hardware</text>
    <text x="995" y="315" font-size="10" fill="#333">CPU: Intel Xeon Platinum 8280 (28-core/node)</text>
    <text x="995" y="333" font-size="10" fill="#333">RAM: 128 GB DDR4 (per node)</text>
    <text x="995" y="351" font-size="10" fill="#333">Storage: 10 TB NVMe RAID-6 + SAN</text>
    <text x="995" y="369" font-size="10" fill="#333">GPU: 4× NVIDIA A100 (40GB each)</text>
    <text x="995" y="387" font-size="10" fill="#333">Deployment: Kubernetes cluster (3+ nodes)</text>
    
    <!-- Software Stack -->
    <rect x="985" y="410" width="350" height="100" fill="#FFE0B2" stroke="#FF9800" stroke-width="1" rx="3"/>
    <text x="1160" y="435" font-size="11" font-weight="bold" text-anchor="middle" fill="#FF9800">Software Stack</text>
    <text x="995" y="460" font-size="10" fill="#333">Kubernetes 1.27+ (container orchestration)</text>
    <text x="995" y="478" font-size="10" fill="#333">Flask + uWSGI (12+ workers)</text>
    <text x="995" y="496" font-size="10" fill="#333">MongoDB sharded cluster (3+ shards)</text>
    <text x="995" y="514" font-size="10" fill="#333">Redis cluster mode (3+ nodes)</text>
    
    <!-- Performance -->
    <rect x="985" y="525" width="350" height="100" fill="#FFE0B2" stroke="#FF9800" stroke-width="1" rx="3"/>
    <text x="1160" y="550" font-size="11" font-weight="bold" text-anchor="middle" fill="#FF9800">Performance</text>
    <text x="995" y="575" font-size="10" fill="#333">Throughput: 100+ students/minute</text>
    <text x="995" y="593" font-size="10" fill="#333">Latency: 30-40ms per face (GPU cluster)</text>
    <text x="995" y="611" font-size="10" fill="#333">Concurrent users: 500+</text>
    <text x="995" y="629" font-size="10" fill="#333">Accuracy: 99.2% (distributed)</text>
    
    <!-- Cost Analysis -->
    <rect x="985" y="640" width="350" height="110" fill="#FFE0B2" stroke="#FF9800" stroke-width="1" rx="3"/>
    <text x="1160" y="665" font-size="11" font-weight="bold" text-anchor="middle" fill="#FF9800">Cost Analysis</text>
    <text x="995" y="690" font-size="10" fill="#333">Hardware: $40K-80K</text>
    <text x="995" y="708" font-size="10" fill="#333">Setup: $10K (Kubernetes, monitoring)</text>
    <text x="995" y="726" font-size="10" fill="#333">Maintenance/year: $8K</text>
    <text x="995" y="744" font-size="10" font-weight="bold" fill="#FF9800">Per student/year: $5-8</text>
    
    <!-- Checklist -->
    <rect x="985" y="765" width="350" height="185" fill="#C5E1A5" stroke="#558B2F" stroke-width="1" rx="3"/>
    <text x="1160" y="790" font-size="11" font-weight="bold" text-anchor="middle" fill="#558B2F">Deployment Checklist</text>
    <text x="995" y="815" font-size="10" fill="#333">✓ Kubernetes multi-node cluster</text>
    <text x="995" y="833" font-size="10" fill="#333">✓ MongoDB sharded cluster</text>
    <text x="995" y="851" font-size="10" fill="#333">✓ Redis cluster mode</text>
    <text x="995" y="869" font-size="10" fill="#333">✓ GPU distributed inference</text>
    <text x="995" y="887" font-size="10" fill="#333">✓ Cloud backup to S3/GCP</text>
    <text x="995" y="905" font-size="10" fill="#333">✓ Disaster recovery plan</text>
    <text x="995" y="923" font-size="10" fill="#333">✓ 24/7 monitoring & alerting</text>
  </g>
</svg>