<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="700" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    MongoDB Database Schema: AutoAttendance System
  </text>
  
  <!-- Collection 1: Students -->
  <g>
    <rect x="30" y="70" width="320" height="200" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
    <text x="190" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976D2">Collection: students</text>
    <text x="35" y="125" font-size="11" fill="#333">_id: ObjectId</text>
    <text x="35" y="145" font-size="11" fill="#333">student_id: "STU2025001" ⭐</text>
    <text x="35" y="165" font-size="11" fill="#333">name: "Shubham Patra"</text>
    <text x="35" y="185" font-size="11" fill="#333">email: "shubham@school.edu"</text>
    <text x="35" y="205" font-size="11" fill="#333">face_embeddings: [array]</text>
    <text x="35" y="225" font-size="11" fill="#333">enrollment_date: ISODate</text>
    <text x="35" y="245" font-size="11" fill="#333">is_active: true</text>
    <text x="275" y="255" font-size="10" font-style="italic" fill="#666">10 students = 100KB</text>
  </g>
  
  <!-- Collection 2: Attendance -->
  <g>
    <rect x="420" y="70" width="320" height="200" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="5"/>
    <text x="580" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#9C27B0">Collection: attendance</text>
    <text x="425" y="125" font-size="11" fill="#333">_id: ObjectId</text>
    <text x="425" y="145" font-size="11" fill="#333">student_id: "STU2025001" ⭐</text>
    <text x="425" y="165" font-size="11" fill="#333">course_id: "CS101" ⭐</text>
    <text x="425" y="185" font-size="11" fill="#333">session_id: ObjectId</text>
    <text x="425" y="205" font-size="11" fill="#333">status: "present"</text>
    <text x="425" y="225" font-size="11" fill="#333">marked_at: ISODate</text>
    <text x="425" y="245" font-size="11" fill="#333">recognition_confidence: 0.92</text>
    <text x="665" y="255" font-size="10" font-style="italic" fill="#666">1M records = 5GB</text>
  </g>
  
  <!-- Collection 3: Sessions -->
  <g>
    <rect x="810" y="70" width="320" height="200" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="5"/>
    <text x="970" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#4CAF50">Collection: attendance_sessions</text>
    <text x="815" y="125" font-size="11" fill="#333">_id: ObjectId ⭐</text>
    <text x="815" y="145" font-size="11" fill="#333">course_id: "CS101"</text>
    <text x="815" y="165" font-size="11" fill="#333">class_date: ISODate</text>
    <text x="815" y="185" font-size="11" fill="#333">total_students_expected: 45</text>
    <text x="815" y="205" font-size="11" fill="#333">total_marked: 42</text>
    <text x="815" y="225" font-size="11" fill="#333">spoofing_attempts: 0</text>
    <text x="815" y="245" font-size="11" fill="#333">status: "completed"</text>
    <text x="1055" y="255" font-size="10" font-style="italic" fill="#666">100K sessions</text>
  </g>
  
  <!-- Collection 4: Courses -->
  <g>
    <rect x="30" y="340" width="320" height="160" fill="#FCE4EC" stroke="#E91E63" stroke-width="2" rx="5"/>
    <text x="190" y="365" font-size="14" font-weight="bold" text-anchor="middle" fill="#E91E63">Collection: courses</text>
    <text x="35" y="395" font-size="11" fill="#333">_id: ObjectId</text>
    <text x="35" y="415" font-size="11" fill="#333">course_id: "CS101" ⭐</text>
    <text x="35" y="435" font-size="11" fill="#333">course_name: "Data Structures"</text>
    <text x="35" y="455" font-size="11" fill="#333">faculty_id: "FAC001"</text>
    <text x="35" y="475" font-size="11" fill="#333">enrolled_students: [...]</text>
    <text x="270" y="485" font-size="10" font-style="italic" fill="#666">100 courses</text>
  </g>
  
  <!-- Collection 5: Users -->
  <g>
    <rect x="420" y="340" width="320" height="160" fill="#FFF4E6" stroke="#FF9800" stroke-width="2" rx="5"/>
    <text x="580" y="365" font-size="14" font-weight="bold" text-anchor="middle" fill="#FF9800">Collection: users</text>
    <text x="425" y="395" font-size="11" fill="#333">_id: ObjectId</text>
    <text x="425" y="415" font-size="11" fill="#333">user_id: "FAC001" ⭐</text>
    <text x="425" y="435" font-size="11" fill="#333">email: "smith@school.edu"</text>
    <text x="425" y="455" font-size="11" fill="#333">role: "faculty"</text>
    <text x="425" y="475" font-size="11" fill="#333">password_hash: "$2b$12$..."</text>
    <text x="665" y="485" font-size="10" font-style="italic" fill="#666">50 users</text>
  </g>
  
  <!-- Collection 6: Security Logs -->
  <g>
    <rect x="810" y="340" width="320" height="160" fill="#F1F8E9" stroke="#7CB342" stroke-width="2" rx="5"/>
    <text x="970" y="365" font-size="14" font-weight="bold" text-anchor="middle" fill="#7CB342">Collection: security_logs</text>
    <text x="815" y="395" font-size="11" fill="#333">_id: ObjectId</text>
    <text x="815" y="415" font-size="11" fill="#333">event_type: "spoofing_attempt"</text>
    <text x="815" y="435" font-size="11" fill="#333">severity: "medium"</text>
    <text x="815" y="455" font-size="11" fill="#333">student_id: "STU2025001"</text>
    <text x="815" y="475" font-size="11" fill="#333">timestamp: ISODate (TTL: 90 days)</text>
    <text x="1055" y="485" font-size="10" font-style="italic" fill="#666">100K events</text>
  </g>
  
  <!-- Relationships (arrows) -->
  
  <!-- Students -> Attendance -->
  <line x1="350" y1="170" x2="420" y2="170" stroke="#C62828" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="385" y="160" font-size="10" font-weight="bold" fill="#C62828">1:Many</text>
  
  <!-- Attendance -> Sessions -->
  <line x1="740" y1="170" x2="810" y2="170" stroke="#C62828" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="775" y="160" font-size="10" font-weight="bold" fill="#C62828">Many:1</text>
  
  <!-- Courses <-> Attendance -->
  <path d="M 190 340 L 190 310 L 580 310 L 580 270" stroke="#F57F17" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="270" y="300" font-size="10" font-weight="bold" fill="#F57F17">Many:1</text>
  
  <!-- Users <-> Sessions -->
  <path d="M 580 340 L 970 340 L 970 270" stroke="#F57F17" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="750" y="330" font-size="10" font-weight="bold" fill="#F57F17">Many:1</text>
  
  <!-- Indexing Strategy -->
  <rect x="30" y="570" width="1340" height="280" fill="#FAFAFA" stroke="#999" stroke-width="1" rx="3"/>
  <text x="50" y="595" font-size="14" font-weight="bold" fill="#333">Indexing Strategy (5 strategic indexes)</text>
  
  <!-- Index 1 -->
  <rect x="50" y="615" width="280" height="120" fill="#E3F2FD" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="190" y="635" font-size="12" font-weight="bold" text-anchor="middle" fill="#1976D2">Index 1: Student ID</text>
  <text x="55" y="658" font-size="10" fill="#333">Collection: students</text>
  <text x="55" y="675" font-size="10" fill="#333">Field: student_id</text>
  <text x="55" y="692" font-size="10" fill="#333">Type: UNIQUE</text>
  <text x="55" y="709" font-size="10" fill="#333">Size: 100MB</text>
  <text x="55" y="726" font-size="10" fill="#666">Usage: Find by student</text>
  
  <!-- Index 2 -->
  <rect x="360" y="615" width="280" height="120" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1" rx="3"/>
  <text x="500" y="635" font-size="12" font-weight="bold" text-anchor="middle" fill="#9C27B0">Index 2: Attendance Compound</text>
  <text x="365" y="658" font-size="10" fill="#333">Collection: attendance</text>
  <text x="365" y="675" font-size="10" fill="#333">Fields: (student_id, course_id, date)</text>
  <text x="365" y="692" font-size="10" fill="#333">Type: COMPOUND</text>
  <text x="365" y="709" font-size="10" fill="#333">Size: 500MB</text>
  <text x="365" y="726" font-size="10" fill="#666">Usage: Course reports</text>
  
  <!-- Index 3 -->
  <rect x="670" y="615" width="280" height="120" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="810" y="635" font-size="12" font-weight="bold" text-anchor="middle" fill="#4CAF50">Index 3: Session Lookup</text>
  <text x="675" y="658" font-size="10" fill="#333">Collection: attendance</text>
  <text x="675" y="675" font-size="10" fill="#333">Fields: (session_id, student_id)</text>
  <text x="675" y="692" font-size="10" fill="#333">Type: COMPOUND</text>
  <text x="675" y="709" font-size="10" fill="#333">Size: 300MB</text>
  <text x="675" y="726" font-size="10" fill="#666">Usage: Session reports</text>
  
  <!-- Index 4 -->
  <rect x="980" y="615" width="190" height="120" fill="#FCE4EC" stroke="#E91E63" stroke-width="1" rx="3"/>
  <text x="1075" y="635" font-size="12" font-weight="bold" text-anchor="middle" fill="#E91E63">Index 4: TTL Logs</text>
  <text x="985" y="658" font-size="10" fill="#333">Collection: security_logs</text>
  <text x="985" y="675" font-size="10" fill="#333">Field: timestamp</text>
  <text x="985" y="692" font-size="10" fill="#333">Type: TTL (90d)</text>
  <text x="985" y="709" font-size="10" fill="#333">Size: 50MB</text>
  <text x="985" y="726" font-size="10" fill="#666">Auto-delete old</text>
  
  <!-- Storage Capacity -->
  <rect x="30" y="750" width="1340" height="120" fill="#FFFDE7" stroke="#F57F17" stroke-width="2" rx="3"/>
  <text x="50" y="775" font-size="14" font-weight="bold" fill="#F57F17">Storage Calculation (10K students, 1M attendance records)</text>
  
  <text x="50" y="805" font-size="12" fill="#333">students collection: 10,000 docs × 10 KB/doc = 100 MB</text>
  <text x="50" y="827" font-size="12" fill="#333">attendance collection: 1,000,000 docs × 5 KB/doc = 5,000 MB (5 GB)</text>
  <text x="50" y="849" font-size="12" fill="#333">sessions, courses, users, logs: ~200 MB</text>
  <text x="50" y="851" font-size="12" fill="#333"><tspan font-weight="bold">TOTAL DATABASE: ~5.3 GB</tspan></text>
  
  <!-- Legend -->
  <text x="50" y="590" font-size="11" fill="#666">⭐ = Indexed field    | 1:Many = One-to-Many relationship    |</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#F57F17"/>
    </marker>
  </defs>
</svg>