<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="700" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    AutoAttendance: Performance Scaling Analysis (100-100K Students)
  </text>
  
  <!-- Performance Metrics Grid -->
  <text x="70" y="80" font-size="14" font-weight="bold" fill="#333">Key Performance Indicators (KPIs) by Student Database Scale</text>
  
  <!-- Scale 1: 100 Students -->
  <rect x="50" y="100" width="280" height="200" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
  <text x="190" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#1976D2">Scale: 100 Students</text>
  <text x="55" y="155" font-size="11" fill="#333">Database: 100 MB</text>
  <text x="55" y="173" font-size="11" fill="#333">FAISS Index: 0.4 MB</text>
  <text x="55" y="191" font-size="11" fill="#333">Per-face latency: 35ms</text>
  <text x="55" y="209" font-size="11" fill="#333">Throughput: 28 FPS</text>
  <text x="55" y="227" font-size="11" fill="#333">Recognition: 99.8%</text>
  <text x="55" y="245" font-size="11" fill="#333">Hardware: i5, 8GB RAM</text>
  <text x="55" y="263" font-size="10" font-style="italic" fill="#666">Linear performance</text>
  
  <!-- Scale 2: 1K Students -->
  <rect x="370" y="100" width="280" height="200" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="5"/>
  <text x="510" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#9C27B0">Scale: 1K Students</text>
  <text x="375" y="155" font-size="11" fill="#333">Database: 1 GB</text>
  <text x="375" y="173" font-size="11" fill="#333">FAISS Index: 4 MB</text>
  <text x="375" y="191" font-size="11" fill="#333">Per-face latency: 45ms</text>
  <text x="375" y="209" font-size="11" fill="#333">Throughput: 22 FPS</text>
  <text x="375" y="227" font-size="11" fill="#333">Recognition: 99.5%</text>
  <text x="375" y="245" font-size="11" fill="#333">Hardware: Xeon, 32GB RAM</text>
  <text x="375" y="263" font-size="10" font-style="italic" fill="#666">FAISS single-stage</text>
  
  <!-- Scale 3: 10K Students -->
  <rect x="690" y="100" width="280" height="200" fill="#FCE4EC" stroke="#E91E63" stroke-width="2" rx="5"/>
  <text x="830" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#E91E63">Scale: 10K Students</text>
  <text x="695" y="155" font-size="11" fill="#333">Database: 10 GB</text>
  <text x="695" y="173" font-size="11" fill="#333">FAISS Index: 40 MB</text>
  <text x="695" y="191" font-size="11" fill="#333">Per-face latency: 100ms</text>
  <text x="695" y="209" font-size="11" fill="#333">Throughput: 10 FPS</text>
  <text x="695" y="227" font-size="11" fill="#333">Recognition: 99.2%</text>
  <text x="695" y="245" font-size="11" fill="#333">Hardware: GPU enabled</text>
  <text x="695" y="263" font-size="10" font-style="italic" fill="#666">Two-stage matching</text>
  
  <!-- Scale 4: 100K Students -->
  <rect x="1010" y="100" width="340" height="200" fill="#E0F2F1" stroke="#009688" stroke-width="2" rx="5"/>
  <text x="1180" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#009688">Scale: 100K Students</text>
  <text x="1015" y="155" font-size="11" fill="#333">Database: 100 GB</text>
  <text x="1015" y="173" font-size="11" fill="#333">FAISS Index: 400 MB (sharded)</text>
  <text x="1015" y="191" font-size="11" fill="#333">Per-face latency: 200ms (distributed)</text>
  <text x="1015" y="209" font-size="11" fill="#333">Throughput: 5 FPS (per-node)</text>
  <text x="1015" y="227" font-size="11" fill="#333">Recognition: 99.0%</text>
  <text x="1015" y="245" font-size="11" fill="#333">Hardware: K8s cluster + GPU</text>
  <text x="1015" y="263" font-size="10" font-style="italic" fill="#666">Sharded FAISS, distributed</text>
  
  <!-- Latency Trend -->
  <rect x="50" y="340" width="1300" height="280" fill="#FAFAFA" stroke="#999" stroke-width="1" rx="3"/>
  <text x="70" y="365" font-size="13" font-weight="bold" fill="#333">Latency vs Database Scale (Trend Analysis)</text>
  
  <!-- SVG Chart -->
  <svg x="70" y="380" width="1260" height="220" viewBox="0 0 1260 220">
    <!-- Axes -->
    <line x1="40" y1="200" x2="1200" y2="200" stroke="#333" stroke-width="2"/>
    <line x1="40" y1="200" x2="40" y2="20" stroke="#333" stroke-width="2"/>
    
    <!-- X-axis labels -->
    <text x="80" y="220" font-size="11" text-anchor="middle" fill="#333">100</text>
    <text x="320" y="220" font-size="11" text-anchor="middle" fill="#333">1K</text>
    <text x="560" y="220" font-size="11" text-anchor="middle" fill="#333">10K</text>
    <text x="800" y="220" font-size="11" text-anchor="middle" fill="#333">100K</text>
    
    <!-- Y-axis labels -->
    <text x="25" y="205" font-size="10" text-anchor="end" fill="#333">0ms</text>
    <text x="25" y="155" font-size="10" text-anchor="end" fill="#333">100ms</text>
    <text x="25" y="105" font-size="10" text-anchor="end" fill="#333">200ms</text>
    <text x="25" y="55" font-size="10" text-anchor="end" fill="#333">300ms</text>
    
    <!-- Grid lines -->
    <line x1="40" y1="150" x2="1200" y2="150" stroke="#DDD" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="40" y1="100" x2="1200" y2="100" stroke="#DDD" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="40" y1="50" x2="1200" y2="50" stroke="#DDD" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Single-stage line (without two-stage optimization) -->
    <polyline points="80,180 320,160 560,80 800,20" stroke="#D32F2F" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
    <text x="900" y="30" font-size="10" fill="#D32F2F">Without optimization (N²)</text>
    
    <!-- Two-stage optimized line -->
    <polyline points="80,190 320,170 560,120 800,160" stroke="#2E7D32" stroke-width="3" fill="none"/>
    <text x="450" y="120" font-size="10" fill="#2E7D32">With two-stage matching (4.7× speedup at 10K)</text>
    
    <!-- Data points -->
    <circle cx="80" cy="190" r="4" fill="#2E7D32" stroke="#1B5E20" stroke-width="2"/>
    <circle cx="320" cy="170" r="4" fill="#2E7D32" stroke="#1B5E20" stroke-width="2"/>
    <circle cx="560" cy="120" r="4" fill="#2E7D32" stroke="#1B5E20" stroke-width="2"/>
    <circle cx="800" cy="160" r="4" fill="#2E7D32" stroke="#1B5E20" stroke-width="2"/>
    
    <!-- Annotations -->
    <text x="80" y="240" font-size="9" text-anchor="middle" fill="#666">35ms</text>
    <text x="320" y="240" font-size="9" text-anchor="middle" fill="#666">45ms</text>
    <text x="560" y="240" font-size="9" text-anchor="middle" fill="#666">100ms (baseline)</text>
    <text x="800" y="240" font-size="9" text-anchor="middle" fill="#666">200ms (w/ network)</text>
  </svg>
  
  <!-- Accuracy by Scale -->
  <rect x="50" y="660" width="620" height="280" fill="#FFFDE7" stroke="#FBC02D" stroke-width="2" rx="3"/>
  <text x="70" y="685" font-size="13" font-weight="bold" fill="#F57F17">Recognition Accuracy vs Scale</text>
  
  <text x="70" y="715" font-size="11" fill="#333">Why accuracy decreases slightly:</text>
  
  <text x="80" y="740" font-size="11" fill="#333">1. Larger databases → more false positives possible</text>
  <text x="80" y="765" font-size="11" fill="#333">2. FAISS coarse filter (0.30 threshold) may exclude true matches</text>
  <text x="80" y="790" font-size="11" fill="#333">3. Embedding collision at scale (multi-student similarity)</text>
  <text x="80" y="815" font-size="11" fill="#333">4. Lighting/angle variations across deployment sites</text>
  
  <text x="70" y="845" font-size="11" font-weight="bold" fill="#F57F17">Mitigation strategies:</text>
  <text x="80" y="870" font-size="10" fill="#333">✓ Adjust FAISS threshold (0.25 for larger DB)</text>
  <text x="80" y="890" font-size="10" fill="#333">✓ Increase query top-K (top-10 instead of top-5)</text>
  <text x="80" y="910" font-size="10" fill="#333">✓ Re-enroll with diverse lighting conditions</text>
  <text x="80" y="930" font-size="10" fill="#333">✓ Use multi-frame voting (3-of-5 consensus)</text>
  
  <!-- Throughput Analysis -->
  <rect x="730" y="660" width="620" height="280" fill="#FFFDE7" stroke="#FBC02D" stroke-width="2" rx="3"/>
  <text x="750" y="685" font-size="13" font-weight="bold" fill="#F57F17">Throughput (FPS) vs Scale</text>
  
  <!-- Throughput bar chart -->
  <rect x="780" y="720" width="50" height="100" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <text x="805" y="710" font-size="10" text-anchor="middle" fill="#333">100</text>
  <text x="805" y="840" font-size="9" text-anchor="middle" fill="#666">28 FPS</text>
  
  <rect x="860" y="760" width="50" height="60" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <text x="885" y="750" font-size="10" text-anchor="middle" fill="#333">1K</text>
  <text x="885" y="840" font-size="9" text-anchor="middle" fill="#666">22 FPS</text>
  
  <rect x="940" y="820" width="50" height="0" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <text x="965" y="810" font-size="10" text-anchor="middle" fill="#333">10K</text>
  <text x="965" y="840" font-size="9" text-anchor="middle" fill="#666">10 FPS</text>
  
  <rect x="1020" y="800" width="50" height="20" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <text x="1045" y="790" font-size="10" text-anchor="middle" fill="#333">100K</text>
  <text x="1045" y="840" font-size="9" text-anchor="middle" fill="#666">5 FPS*</text>
  
  <text x="750" y="715" font-size="10" fill="#333">Per-GPU/CPU throughput</text>
  <text x="750" y="860" font-size="10" fill="#666">*100K uses multi-GPU cluster (5× throughput total)</text>
  
  <text x="750" y="900" font-size="11" fill="#333">Scaling strategy:</text>
  <text x="760" y="920" font-size="10" fill="#333">• 100-1K: Single server CPU</text>
  <text x="760" y="938" font-size="10" fill="#333">• 1K-10K: GPU acceleration (5× throughput)</text>
  <text x="760" y="956" font-size="10" fill="#333">• 10K+: Kubernetes cluster (N×throughput)</text>
  
  <!-- Database Storage -->
  <rect x="50" y="980" width="1300" height="30" fill="#E8F4F8" stroke="#0088CC" stroke-width="1" rx="3"/>
  <text x="70" y="1000" font-size="11" fill="#333">Storage Formula: ~10KB/student (embeddings + metadata) + ~5KB per attendance record</text>
</svg>