<svg viewBox="0 0 1400 1050" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="700" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    ArcFace: ResNet-100 Face Embedding Architecture
  </text>
  
  <!-- Input -->
  <rect x="580" y="60" width="240" height="70" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
  <text x="700" y="92" font-size="13" font-weight="bold" text-anchor="middle" fill="#1976D2">Input: Aligned Face</text>
  <text x="700" y="113" font-size="12" text-anchor="middle" fill="#666">RGB, 112×112 pixels</text>
  
  <!-- Arrow down -->
  <line x1="700" y1="130" x2="700" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stem Block -->
  <rect x="550" y="160" width="300" height="80" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="5"/>
  <text x="700" y="190" font-size="13" font-weight="bold" text-anchor="middle" fill="#9C27B0">Stem: Conv 3×3 + BN + ReLU</text>
  <text x="700" y="213" font-size="12" text-anchor="middle" fill="#333">Output: 56×56×64 feature maps</text>
  <text x="700" y="231" font-size="11" text-anchor="middle" fill="#666">~400K parameters</text>
  
  <!-- Arrow -->
  <line x1="700" y1="240" x2="700" y2="270" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Residual Block Groups -->
  <g id="blocks">
    <!-- Block 1 -->
    <rect x="100" y="270" width="240" height="100" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="5"/>
    <text x="220" y="295" font-size="12" font-weight="bold" text-anchor="middle" fill="#4CAF50">Residual Block 1</text>
    <text x="220" y="318" font-size="11" text-anchor="middle" fill="#333">3 layers, stride=1</text>
    <text x="220" y="338" font-size="11" text-anchor="middle" fill="#333">Output: 56×56×64</text>
    <text x="220" y="358" font-size="10" text-anchor="middle" fill="#666">~200K params</text>
    
    <!-- Block 2 -->
    <rect x="380" y="270" width="240" height="100" fill="#FCE4EC" stroke="#E91E63" stroke-width="2" rx="5"/>
    <text x="500" y="295" font-size="12" font-weight="bold" text-anchor="middle" fill="#E91E63">Residual Block 2</text>
    <text x="500" y="318" font-size="11" text-anchor="middle" fill="#333">4 layers, stride=2</text>
    <text x="500" y="338" font-size="11" text-anchor="middle" fill="#333">Output: 28×28×128</text>
    <text x="500" y="358" font-size="10" text-anchor="middle" fill="#666">~1.2M params</text>
    
    <!-- Block 3 -->
    <rect x="660" y="270" width="240" height="100" fill="#E0F2F1" stroke="#009688" stroke-width="2" rx="5"/>
    <text x="780" y="295" font-size="12" font-weight="bold" text-anchor="middle" fill="#009688">Residual Block 3</text>
    <text x="780" y="318" font-size="11" text-anchor="middle" fill="#333">14 layers, stride=2</text>
    <text x="780" y="338" font-size="11" text-anchor="middle" fill="#333">Output: 14×14×256</text>
    <text x="780" y="358" font-size="10" text-anchor="middle" fill="#666">~7.5M params</text>
    
    <!-- Block 4 -->
    <rect x="940" y="270" width="240" height="100" fill="#FFF4E6" stroke="#FF9800" stroke-width="2" rx="5"/>
    <text x="1060" y="295" font-size="12" font-weight="bold" text-anchor="middle" fill="#FF9800">Residual Block 4</text>
    <text x="1060" y="318" font-size="11" text-anchor="middle" fill="#333">3 layers, stride=2</text>
    <text x="1060" y="338" font-size="11" text-anchor="middle" fill="#333">Output: 7×7×512</text>
    <text x="1060" y="358" font-size="10" text-anchor="middle" fill="#666">~2M params</text>
    
    <!-- Block 5 -->
    <rect x="1220" y="270" width="140" height="100" fill="#F1F8E9" stroke="#7CB342" stroke-width="2" rx="5"/>
    <text x="1290" y="295" font-size="11" font-weight="bold" text-anchor="middle" fill="#7CB342">Batch Norm</text>
    <text x="1290" y="315" font-size="10" text-anchor="middle" fill="#333">Spatial: 7×7</text>
    <text x="1290" y="335" font-size="10" text-anchor="middle" fill="#333">Channels: 512</text>
    <text x="1290" y="355" font-size="10" text-anchor="middle" fill="#666">Norm only</text>
  </g>
  
  <!-- Arrows between blocks -->
  <line x1="340" y1="320" x2="380" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="320" x2="660" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="900" y1="320" x2="940" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1180" y1="320" x2="1220" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow to global pooling -->
  <line x1="1290" y1="370" x2="1290" y2="410" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Global Average Pooling -->
  <rect x="1130" y="410" width="320" height="80" fill="#FFFDE7" stroke="#FBC02D" stroke-width="2" rx="5"/>
  <text x="1290" y="440" font-size="13" font-weight="bold" text-anchor="middle" fill="#F57F17">Global Average Pooling</text>
  <text x="1290" y="463" font-size="12" text-anchor="middle" fill="#333">7×7×512 → 512</text>
  <text x="1290" y="481" font-size="11" text-anchor="middle" fill="#666">Flattened feature vector</text>
  
  <!-- Arrow to fc layer -->
  <line x1="1290" y1="490" x2="1290" y2="530" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- FC Layer (not used in inference) -->
  <rect x="1130" y="530" width="320" height="80" fill="#FCE4EC" stroke="#E91E63" stroke-width="2" rx="5"/>
  <text x="1290" y="560" font-size="13" font-weight="bold" text-anchor="middle" fill="#E91E63">Fully Connected Layer</text>
  <text x="1290" y="583" font-size="12" text-anchor="middle" fill="#333">512 → N_classes (training only)</text>
  <text x="1290" y="601" font-size="11" text-anchor="middle" fill="#666">Removed in inference</text>
  
  <!-- Arrow to L2 norm -->
  <line x1="1130" y1="570" x2="950" y2="570" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- L2 Normalization (main output) -->
  <rect x="750" y="530" width="300" height="100" fill="#E3F2FD" stroke="#1976D2" stroke-width="3" rx="5"/>
  <text x="900" y="560" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976D2">L2 Normalization</text>
  <text x="900" y="583" font-size="12" text-anchor="middle" fill="#333">e = embedding / ||embedding||</text>
  <text x="900" y="606" font-size="12" text-anchor="middle" fill="#333">Output: 512-D unit vector</text>
  <text x="900" y="624" font-size="11" text-anchor="middle" fill="#666">||e|| = 1.0 on hypersphere</text>
  
  <!-- Arrow to loss function -->
  <line x1="900" y1="630" x2="900" y2="670" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Loss Function (training) -->
  <rect x="700" y="670" width="400" height="120" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="5"/>
  <text x="900" y="700" font-size="13" font-weight="bold" text-anchor="middle" fill="#9C27B0">Angular Margin Loss (Training)</text>
  <text x="705" y="725" font-size="11" fill="#333">L = -log(e^(s(cos(θ_yi + m) - λ)) / (e^(s(cos(θ_yi + m) - λ)) + Σe^(s·cos(θ_j))))</text>
  <text x="705" y="748" font-size="11" fill="#333">where:</text>
  <text x="720" y="766" font-size="10" fill="#333">θ = angle between embedding and class center</text>
  <text x="720" y="783" font-size="10" fill="#333">m = angular margin (typical: 0.5 radians)</text>
  <text x="720" y="800" font-size="10" fill="#333">s = scale factor (typical: 64)</text>
  
  <!-- Final output box -->
  <rect x="650" y="820" width="500" height="90" fill="#C8E6C9" stroke="#2E7D32" stroke-width="3" rx="5"/>
  <text x="900" y="850" font-size="14" font-weight="bold" text-anchor="middle" fill="#1B5E20">Output: Face Embedding (Inference)</text>
  <text x="900" y="873" font-size="12" text-anchor="middle" fill="#2E7D32">512-dimensional L2-normalized vector</text>
  <text x="900" y="891" font-size="12" text-anchor="middle" fill="#2E7D32">Comparable with cosine similarity: (-1, 1)</text>
  
  <!-- Inference vs Training comparison -->
  <rect x="50" y="410" width="650" height="220" fill="#FAFAFA" stroke="#999" stroke-width="1" rx="3"/>
  <text x="70" y="435" font-size="13" font-weight="bold" fill="#333">Inference vs Training Pipeline</text>
  
  <rect x="70" y="455" width="300" height="170" fill="#E3F2FD" stroke="#1976D2" stroke-width="1" rx="3"/>
  <text x="220" y="480" font-size="12" font-weight="bold" text-anchor="middle" fill="#1976D2">TRAINING Pipeline</text>
  <text x="75" y="505" font-size="11" fill="#333">1. Input: face image</text>
  <text x="75" y="525" font-size="11" fill="#333">2. ResNet-100 backbone</text>
  <text x="75" y="545" font-size="11" fill="#333">3. FC layer (512 → N_classes)</text>
  <text x="75" y="565" font-size="11" fill="#333">4. Angular Margin Loss</text>
  <text x="75" y="585" font-size="11" fill="#333">5. Backprop through all layers</text>
  <text x="75" y="605" font-size="11" fill="#666">Output: Updated weights</text>
  
  <rect x="400" y="455" width="300" height="170" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1" rx="3"/>
  <text x="550" y="480" font-size="12" font-weight="bold" text-anchor="middle" fill="#1B5E20">INFERENCE Pipeline</text>
  <text x="405" y="505" font-size="11" fill="#333">1. Input: face image</text>
  <text x="405" y="525" font-size="11" fill="#333">2. ResNet-100 backbone</text>
  <text x="405" y="545" font-size="11" fill="#333">3. Global pooling (512)</text>
  <text x="405" y="565" font-size="11" fill="#333">4. L2 normalization</text>
  <text x="405" y="585" font-size="11" fill="#333">5. No FC layer (removed)</text>
  <text x="405" y="605" font-size="11" fill="#666">Output: 512-D embedding</text>
  
  <!-- Performance characteristics -->
  <rect x="50" y="690" width="1340" height="150" fill="#FFFDE7" stroke="#F57F17" stroke-width="2" rx="3"/>
  <text x="70" y="715" font-size="13" font-weight="bold" fill="#F57F17">Performance Characteristics</text>
  
  <text x="70" y="745" font-size="12" fill="#333">Model Size: 250 MB (full) / 80 MB (INT8 quantized)</text>
  <text x="70" y="768" font-size="12" fill="#333">Inference Latency: 18ms (CPU single-threaded) | 3ms (GPU)</text>
  <text x="70" y="791" font-size="12" fill="#333">Total Parameters: 43.7M (ResNet-100)</text>
  <text x="70" y="814" font-size="12" fill="#333">LFW Accuracy: 99.8% | VoxCeleb Accuracy: 98.4% | DeepGlint Accuracy: 99.7%</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#333"/>
    </marker>
  </defs>
</svg>