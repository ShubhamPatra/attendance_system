# Nginx reverse proxy configuration for AutoAttendance
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled/

upstream autoattendance {
    server 127.0.0.1:5000;
}

server {
    listen 80;
    server_name _;

    # --- SSL placeholder ---
    # To enable HTTPS, uncomment and configure:
    # listen 443 ssl;
    # ssl_certificate /etc/ssl/certs/your_cert.pem;
    # ssl_certificate_key /etc/ssl/private/your_key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
    gzip_vary on;

    # Client body size limit (10 MB for image uploads)
    client_max_body_size 10m;

    # Static files
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket support for SocketIO
    location /socket.io/ {
        proxy_pass http://autoattendance;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # MJPEG video feed (long-lived connection)
    location /video_feed {
        proxy_pass http://autoattendance;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # All other requests
    location / {
        proxy_pass http://autoattendance;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
