<!doctype html>
<html>
  <body>
    <h2>Change Password</h2>
    <form method="post">
      {{ form.csrf_token }}
      <div>{{ form.old_password.label }} {{ form.old_password() }}</div>
      <div>{{ form.new_password.label }} {{ form.new_password() }}</div>
      <div>{{ form.submit() }}</div>
    </form>
  </body>
</html>
